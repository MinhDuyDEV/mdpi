name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  verify:
    name: typecheck · test · build (node ${{ matrix.node }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [20, 22]
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node ${{ matrix.node }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Tests
        run: npm test

      - name: Build (tsdown + bundle template)
        run: npm run build

      - name: Smoke-test built CLI
        run: node dist/index.js --version && node dist/index.js --help >/dev/null

      - name: Verify bundled template integrity
        run: |
          test -d dist/template/.pi/skills
          test -d dist/template/.pi/agents
          test -f dist/template/.pi/settings.json
          echo "bundle ok: $(find dist/template/.pi -type f | wc -l) files"